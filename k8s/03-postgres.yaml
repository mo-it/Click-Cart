# PostgreSQL Deployment — the record book behind the checkout counter
# Single replica with PVC-backed storage and Secret-managed credentials
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          # Readiness probe — Postgres is ready when it accepts connections
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "checkout"]
            initialDelaySeconds: 5
            periodSeconds: 5
          # Liveness probe — restart if Postgres stops responding
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "checkout"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
# Postgres Service — ClusterIP so other pods can reach it at postgres-svc:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
