# Checkout Service — the orchestrator
# Connects to Postgres, calls Pricing + Inventory
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  labels:
    app: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: checkout:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          # Inject Postgres credentials from Secret
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: PRICING_URL
              value: "http://pricing-svc"
            - name: INVENTORY_URL
              value: "http://inventory-svc"
            - name: DB_HOST
              value: "postgres-svc"
            - name: DB_PORT
              value: "5432"
            - name: DEPENDENCY_TIMEOUT
              value: "3.0"
          # Startup probe: gives the container up to 30s to boot
          # before K8s starts checking readiness/liveness
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 10
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-svc
  labels:
    app: checkout
spec:
  selector:
    app: checkout
  ports:
    - port: 80
      targetPort: 8001
  type: ClusterIP
