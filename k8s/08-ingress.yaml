# Ingress — routes external traffic through K3s built-in Traefik
# to the Gateway service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: checkout-ingress
  labels:
    app: gateway
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-svc
                port:
                  number: 80
