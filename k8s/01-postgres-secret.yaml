# Postgres credentials — using stringData (plain text, K8s encodes automatically)
# Matches the pattern from Lab 3.5
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: "checkout"
  POSTGRES_PASSWORD: "sup3rS3cret!"
  POSTGRES_DB: "checkoutdb"
